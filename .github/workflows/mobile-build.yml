name: Mobile builds

# Builds the Capacitor-wrapped game for both mobile platforms:
#  - Android: debug APK (installable directly on a device with
#    "install from unknown sources"; no signing secrets required)
#  - iOS: unsigned .app bundle (installable on a simulator, or
#    sideloadable after signing locally with your own Apple ID via
#    Xcode/AltStore — store distribution needs Apple certificates)
#
# Both jobs upload their output as workflow artifacts — grab them from
# the run's Summary page.

on:
  push:
    branches: [main, feature/mobile-distribution]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (relative base for file:// loading)
        run: npm run build:mobile

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: east-vs-west-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    name: iOS app (unsigned)
    runs-on: macos-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (relative base for file:// loading)
        run: npm run build:mobile

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build (unsigned)
        working-directory: ios/App
        run: |
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package unsigned IPA
        working-directory: ios/App
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/App.app Payload/
          zip -ry east-vs-west-ios-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: east-vs-west-ios-unsigned
          path: ios/App/east-vs-west-ios-unsigned.ipa
          if-no-files-found: error
